<meta charset="utf-8">

{% include seo.html %}

<meta name="HandheldFriendly" content="True">
<meta name="MobileOptimized" content="320">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark light">

<script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';
  (function () {
    var theme = 'dark';
    try {
      theme = localStorage.getItem('shuyu-theme') || 'dark';
    } catch (error) {
      console.warn('Unable to read the saved color theme.', error);
    }
    document.documentElement.setAttribute('data-theme', theme === 'light' ? 'light' : 'dark');
  }());
</script>

{% assign asset_version = site.github.build_revision | default: site.time %}
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ asset_version | url_encode }}">

<meta http-equiv="cleartype" content="on">
